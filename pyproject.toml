[tool.black]
line-length = 88
target-version = ["py312"]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]  # line length is enforced by black

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
check_untyped_defs = true

[tool.ruff.lint.per-file-ignores]
"tests/conftest.py" = ["E402"]  # late imports are intentional (env/mock setup before app)
