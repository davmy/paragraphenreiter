name: Deploy to Uberspace

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.UBERSPACE_HOST }}
          username: ${{ secrets.UBERSPACE_USER }}
          key: ${{ secrets.UBERSPACE_SSH_KEY }}
          script: |
            cd ~/var/lib/paragraphenreiter
            git pull origin main
            source .venv/bin/activate
            pip install -r requirements.lock
            supervisorctl restart paragraphenreiter

      - name: Smoke test
        run: |
          sleep 5
          curl -sf https://paragraphenreiter.meier-david.de/api/health
