name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.lock
          pip install -r requirements-dev.txt
          pip install pip-audit

      - name: Vulnerability scan
        run: pip-audit -r requirements.lock

      - name: Black check
        run: black --check app.py rag.py crawler.py logging_config.py tests/

      - name: Ruff check
        run: ruff check app.py rag.py crawler.py logging_config.py tests/

      - name: Type check
        run: mypy app.py rag.py crawler.py logging_config.py

      - name: Tests
        run: pytest tests/ -v
        env:
          ANTHROPIC_API_KEY: sk-test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
