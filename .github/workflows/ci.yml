name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install pip-audit

      - name: Vulnerability scan
        run: pip-audit -r requirements.txt

      - name: Black check
        run: black --check app.py rag.py crawler.py tests/

      - name: Ruff check
        run: ruff check app.py rag.py crawler.py tests/

      - name: Type check
        run: mypy app.py rag.py crawler.py

      - name: Tests
        run: pytest tests/ -v
        env:
          ANTHROPIC_API_KEY: sk-test
