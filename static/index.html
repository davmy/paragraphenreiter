    opt.textContent = label;

    const saved = localStorage.getItem('lang');
    if (saved && T[saved]) return saved;
    const browser = (navigator.language || 'de').split('-')[0].toLowerCase();
    return T[browser] ? browser : 'de';
  }

  let currentLang = detectLang();

  function t(key) { return T[currentLang][key]; }

  function setLang(lang) {
    if (!T[lang]) return;
    currentLang = lang;
    localStorage.setItem('lang', lang);
    applyTranslations();
  }

    document.documentElement.lang = currentLang;
    langSelect.value = currentLang;

      <h2>${t('welcomeTitle')}</h2>
      <p>${t('welcomeBody')}</p>
      <p style="margin-top:10px;font-size:0.82rem;color:#9fa8da">${t('welcomeDisclaimer')}</p>
      <div class="suggestions">
        ${t('suggestions').map(s => `<button class="suggestion-btn" onclick="useSuggestion(this)">${s}</button>`).join('')}
      </div>`;
    wrapper.appendChild(bubble);
    container.insertBefore(wrapper, container.firstChild);
  }

  // ── Chat state ──────────────────────────────────────────
  const chatContainer = document.getElementById('chat-container');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const statusBar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');

  let history = [];
  let isStreaming = false;
  let activeReader = null;

  // ── Marked setup ────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });
  const renderer = new marked.Renderer();
  const _link = renderer.link.bind(renderer);
  renderer.link = (href, title, text) => {
    return _link(href, title, text).replace('<a ', '<a target="_blank" rel="noopener noreferrer" ');
  };
  marked.use({ renderer });

  // ── UI helpers ──────────────────────────────────────────
  function stopStreaming() {
    if (activeReader) { activeReader.cancel(); activeReader = null; }
    isStreaming = false;
    sendBtn.disabled = false;
    document.getElementById('stop-btn').style.display = 'none';
    hideStatus();
    document.querySelectorAll('.cursor').forEach(c => c.remove());
  }

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
  });
  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function useSuggestion(btn) { userInput.value = btn.textContent; sendMessage(); }
  function showStatus(text) { statusText.textContent = text; statusBar.classList.remove('hidden'); }
  function hideStatus() { statusBar.classList.add('hidden'); }
  function scrollToBottom() { chatContainer.scrollTop = chatContainer.scrollHeight; }

  function addMessage(role, content) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (role === 'assistant') bubble.innerHTML = marked.parse(content);
    else bubble.textContent = content;
    div.appendChild(bubble);
    chatContainer.appendChild(div);
    scrollToBottom();
    return bubble;
  }

  function addAssistantStreamBubble() {
    const div = document.createElement('div');
    div.className = 'message assistant';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    bubble.appendChild(cursor);
    div.appendChild(bubble);
    chatContainer.appendChild(div);
    scrollToBottom();
    return { bubble, div };
  }

  // ── Send message ────────────────────────────────────────
  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    document.getElementById('stop-btn').style.display = 'flex';
    userInput.value = '';
    userInput.style.height = 'auto';

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    const { bubble, div: assistantDiv } = addAssistantStreamBubble();
    let rawContent = '';

    showStatus(t('statusSearching'));

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(0, -1), language: currentLang }),
      });

      if (!response.ok) throw new Error(`HTTP ${response.status}`);

      const reader = response.body.getReader();
      activeReader = reader;
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = JSON.parse(line.slice(6));
          if (data.type === 'status') {
            showStatus(data.content);
          } else if (data.type === 'content') {
            rawContent += data.content;
            bubble.innerHTML = marked.parse(rawContent);
            const c = document.createElement('span');
            c.className = 'cursor';
            bubble.appendChild(c);
            scrollToBottom();
          } else if (data.type === 'error') {
            rawContent += `\n\n❌ ${t('errorPrefix')}: ${data.content}`;
            bubble.innerHTML = marked.parse(rawContent);
          } else if (data.type === 'done') {
            bubble.innerHTML = marked.parse(rawContent);
            hideStatus();
          }
        }
      }
    } catch (err) {
      bubble.innerHTML = marked.parse(`❌ ${t('errorConnection')}: ${err.message}`);
      hideStatus();
    }

    const cur = bubble.querySelector('.cursor');
    if (cur) cur.remove();
    if (rawContent) {
      bubble.innerHTML = marked.parse(rawContent + '\n\n' + t('disclaimer'));
    }
    history.push({ role: 'assistant', content: rawContent });

    isStreaming = false;
    activeReader = null;
    sendBtn.disabled = false;
    document.getElementById('stop-btn').style.display = 'none';
    userInput.focus();
    scrollToBottom();
  }

  // ── Init ────────────────────────────────────────────────
  let legalNoticeUrl = null;

  fetch('/api/config')
    .then(r => r.json())
    .then(cfg => { legalNoticeUrl = cfg.legal_notice_url || null; })
    .catch(() => {})
    .finally(() => { applyTranslations(); userInput.focus(); });
</script>
</body>
</html>
