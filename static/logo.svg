<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200">
  <!-- Background shield -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- Horse body -->
  <g filter="url(#shadow)">
    <!-- Main body -->
    <ellipse cx="170" cy="148" rx="72" ry="34" fill="#6D4C41"/>
    <!-- Rump highlight -->
    <ellipse cx="155" cy="142" rx="45" ry="22" fill="#795548" opacity="0.5"/>

    <!-- Neck -->
    <path d="M228 135 Q245 115 240 95" stroke="#6D4C41" stroke-width="26" stroke-linecap="round" fill="none"/>
    <!-- Neck highlight -->
    <path d="M230 130 Q246 112 241 96" stroke="#795548" stroke-width="14" stroke-linecap="round" fill="none" opacity="0.5"/>

    <!-- Head -->
    <ellipse cx="244" cy="87" rx="26" ry="16" fill="#6D4C41" transform="rotate(-25 244 87)"/>
    <!-- Snout -->
    <ellipse cx="259" cy="95" rx="13" ry="9" fill="#6D4C41" transform="rotate(-25 259 95)"/>
    <!-- Nostril -->
    <ellipse cx="265" cy="98" rx="3" ry="2" fill="#4E342E" transform="rotate(-25 265 98)"/>

    <!-- Ear -->
    <polygon points="237,73 243,58 250,71" fill="#6D4C41"/>
    <polygon points="239,72 243,62 248,71" fill="#8D6E63"/>

    <!-- Eye -->
    <circle cx="248" cy="82" r="4.5" fill="#1a1a1a"/>
    <circle cx="249.5" cy="81" r="1.5" fill="white"/>

    <!-- Mane -->
    <path d="M237 95 Q228 108 232 122 Q222 112 226 128 Q216 118 220 134" stroke="#4E342E" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Tail -->
    <path d="M101 145 Q75 125 80 158 Q62 135 68 168 Q55 148 62 178" stroke="#4E342E" stroke-width="7" fill="none" stroke-linecap="round"/>

    <!-- Legs – galloping pose -->
    <!-- Front right (extended forward) -->
    <path d="M210 176 L225 200 L232 216" stroke="#6D4C41" stroke-width="13" stroke-linecap="round" fill="none"/>
    <!-- Front left (tucked) -->
    <path d="M195 178 L200 200 L196 215" stroke="#6D4C41" stroke-width="13" stroke-linecap="round" fill="none"/>
    <!-- Back left (extended back) -->
    <path d="M138 178 L124 202 L116 216" stroke="#6D4C41" stroke-width="13" stroke-linecap="round" fill="none"/>
    <!-- Back right (tucked up) -->
    <path d="M152 178 L145 200 L140 214" stroke="#6D4C41" stroke-width="13" stroke-linecap="round" fill="none"/>

    <!-- Hooves -->
    <rect x="224" y="213" width="16" height="7" rx="3.5" fill="#3E2723"/>
    <rect x="189" y="213" width="16" height="7" rx="3.5" fill="#3E2723"/>
    <rect x="109" y="213" width="16" height="7" rx="3.5" fill="#3E2723"/>
    <rect x="133" y="211" width="16" height="7" rx="3.5" fill="#3E2723"/>
  </g>

  <!-- Motion lines -->
  <line x1="88" y1="130" x2="60" y2="130" stroke="#1a237e" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="92" y1="142" x2="55" y2="142" stroke="#1a237e" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <line x1="90" y1="154" x2="62" y2="154" stroke="#1a237e" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- § Rider -->
  <!-- Judge's wig -->
  <ellipse cx="170" cy="100" rx="24" ry="9" fill="#ECEFF1"/>
  <rect x="150" y="88" width="40" height="15" rx="5" fill="#ECEFF1"/>
  <circle cx="152" cy="107" r="8" fill="#ECEFF1"/>
  <circle cx="188" cy="107" r="8" fill="#ECEFF1"/>
  <!-- Wig center curl -->
  <ellipse cx="170" cy="86" rx="10" ry="5" fill="#ECEFF1"/>

  <!-- § symbol as body of rider -->
  <text x="170" y="155"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72"
        font-weight="bold"
        fill="url(#bg)"
        text-anchor="middle"
        stroke="#FFD700"
        stroke-width="1.5">§</text>

  <!-- Reins -->
  <path d="M170 140 Q200 132 230 110" stroke="#8D6E63" stroke-width="2.5" fill="none" stroke-dasharray="4,2" opacity="0.7"/>
</svg>
